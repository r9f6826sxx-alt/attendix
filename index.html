<!DOCTYPE html>
<html>
<head>
<title>Rénora</title>

<style>
body {
  font-family: Arial;
  background: #ffffff;
  padding: 20px;
}

h1 {
  color: #F4A7B9;
}

.card {
  background: #F5EDE6;
  padding: 15px;
  border-radius: 12px;
  margin: 10px 0;
}

button {
  margin: 5px;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.present { background: #4CAF50; color: white; }
.absent { background: #f44336; color: white; }
.add { background: #F4A7B9; color: white; }

input {
  padding: 8px;
  margin: 5px;
}
</style>

</head>

<body>

<h1>Rénora 💅</h1>

<div class="card">
  <h3>Add Class</h3>
  <input id="name" placeholder="Subject">
  <input id="hours" type="number" placeholder="Hours (1/2/3)">
  <button class="add" onclick="addClass()">Add</button>
</div>

<div id="schedule"></div>

<div class="card">
  <h3>Overall Attendance</h3>
  <p id="result">0%</p>
</div>

<script>
let classes = [];
let attended = 0;
let total = 0;

function addClass() {
  let name = document.getElementById("name").value;
  let hours = parseInt(document.getElementById("hours").value);

  classes.push({name, hours});
  render();
}

function markPresent(i) {
  attended += classes[i].hours;
  total += classes[i].hours;
  render();
}

function markAbsent(i) {
  total += classes[i].hours;
  render();
}

function render() {
  let container = document.getElementById("schedule");
  container.innerHTML = "";

  classes.forEach((c, i) => {
    container.innerHTML += `
      <div class="card">
        ${c.name} (${c.hours} hr)
        <br>
        <button class="present" onclick="markPresent(${i})">Present</button>
        <button class="absent" onclick="markAbsent(${i})">Absent</button>
      </div>
    `;
  });

  let percent = total === 0 ? 0 : (attended / total) * 100;
  document.getElementById("result").innerText = percent.toFixed(2) + "%";
}
</script>

</body>
</html>
