<!DOCTYPE html>
<html>
<head>
<title>Rénora</title>

<style>
body {
  font-family: Arial;
  background: #ffffff;
  padding: 20px;
}

h1 {
  color: #F4A7B9;
}

.card {
  background: #F5EDE6;
  padding: 15px;
  border-radius: 12px;
  margin: 10px 0;
}

input {
  padding: 8px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.add { background: #F4A7B9; color: white; }
.present { background: #4CAF50; color: white; }
.absent { background: #f44336; color: white; }

.result {
  font-size: 22px;
  color: #F4A7B9;
  font-weight: bold;
}
</style>

</head>

<body>

<h1>Rénora 💅</h1>

<div class="card">
  <h3>Enter Your Current Attendance</h3>
  <input id="baseA" placeholder="Attended so far">
  <input id="baseT" placeholder="Total so far">
  <button class="add" onclick="setInitial()">Set</button>
</div>

<div class="card">
  <h3>Add Class / Lab</h3>
  <input id="name" placeholder="Subject name">
  <input id="hours" type="number" placeholder="Hours (1/2/3)">
  <button class="add" onclick="addClass()">Add</button>
</div>

<div id="schedule"></div>

<div class="card">
  <h3>Overall Attendance</h3>
  <p id="result" class="result">0%</p>
</div>

<script>

let baseAttended = 0;
let baseTotal = 0;

let extraAttended = 0;
let extraTotal = 0;

let classes = [];

function setInitial() {
  baseAttended = parseInt(document.getElementById("baseA").value);
  baseTotal = parseInt(document.getElementById("baseT").value);
  update();
}

function addClass() {
  let name = document.getElementById("name").value;
  let hours = parseInt(document.getElementById("hours").value);

  classes.push({name, hours});
  render();
}

function markPresent(index) {
  extraAttended += classes[index].hours;
  extraTotal += classes[index].hours;
  update();
}

function markAbsent(index) {
  extraTotal += classes[index].hours;
  update();
}

function update() {
  let totalAtt = baseAttended + extraAttended;
  let totalCls = baseTotal + extraTotal;

  let percent = totalCls === 0 ? 0 : (totalAtt / totalCls) * 100;
  document.getElementById("result").innerText = percent.toFixed(2) + "%";
}

function render() {
  let container = document.getElementById("schedule");
  container.innerHTML = "";

  classes.forEach((c, i) => {
    container.innerHTML += `
      <div class="card">
        <b>${c.name}</b> (${c.hours} hr)<br>
        <button class="present" onclick="markPresent(${i})">Present</button>
        <button class="absent" onclick="markAbsent(${i})">Absent</button>
      </div>
    `;
  });
}

</script>

</body>
</html>
