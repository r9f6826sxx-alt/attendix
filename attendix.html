<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rénora</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #F4A7B9;
    }

    .card {
      background: #F5EDE6;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
    }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      background: #F4A7B9;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .percentage {
      font-size: 20px;
      font-weight: bold;
      color: #F4A7B9;
    }
  </style>
</head>

<body>

<h1>Rénora 💅</h1>

<div class="card">
  <h3>Add Subject</h3>
  <input type="text" id="subject" placeholder="Subject">
  <input type="number" id="attended" placeholder="Attended">
  <input type="number" id="total" placeholder="Total">
  <button onclick="addSubject()">Add</button>
</div>

<div id="subjects"></div>

<div class="card">
  <h3>Overall Attendance</h3>
  <p class="percentage" id="overall">0%</p>
</div>

<div class="card">
  <h3>Prediction</h3>
  <input type="number" id="future" placeholder="Future Classes">
  <button onclick="predict()">Check</button>
  <p id="predictionResult"></p>
</div>

<script>
let subjects = [];

function addSubject() {
  let name = document.getElementById("subject").value;
  let attended = parseInt(document.getElementById("attended").value);
  let total = parseInt(document.getElementById("total").value);

  subjects.push({name, attended, total});
  render();
}

function render() {
  let container = document.getElementById("subjects");
  container.innerHTML = "";

  let totalAtt = 0;
  let totalCls = 0;

  subjects.forEach(sub => {
    let percent = ((sub.attended / sub.total) * 100).toFixed(2);

    totalAtt += sub.attended;
    totalCls += sub.total;

    container.innerHTML += `
      <div class="card">
        <b>${sub.name}</b><br>
        ${sub.attended}/${sub.total} 
        <span class="percentage">${percent}%</span>
      </div>
    `;
  });

  let overall = ((totalAtt / totalCls) * 100).toFixed(2);
  document.getElementById("overall").innerText = overall + "%";
}

function predict() {
  let future = parseInt(document.getElementById("future").value);

  let totalAtt = 0;
  let totalCls = 0;

  subjects.forEach(sub => {
    totalAtt += sub.attended;
    totalCls += sub.total;
  });

  let newPercent = ((totalAtt + future) / (totalCls + future) * 100).toFixed(2);

  document.getElementById("predictionResult").innerText =
    "New Attendance: " + newPercent + "%";
}
</script>

</body>
</html>
